<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image OCR Extractor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Image OCR Extractor</h1>
      <p class="subtitle">Use your camera to capture a photo, submit it, and view extracted JSON as key-value table rows.</p>

      <form id="uploadForm" class="card">
        <div class="camera-toolbar">
          <button id="startCameraBtn" type="button">Start Camera</button>
          <button id="captureBtn" type="button" disabled>Capture Photo</button>
          <button id="retakeBtn" type="button" disabled>Retake</button>
        </div>

        <div class="camera-stage">
          <video id="cameraView" autoplay playsinline muted hidden></video>
          <img id="preview" alt="Captured preview" hidden />
        </div>

        <canvas id="captureCanvas" hidden></canvas>

        <button id="submitBtn" type="submit">Submit</button>
      </form>

      <section id="resultSection" class="card" hidden>
        <h2>Extracted Data</h2>
        <div id="resultMeta" class="meta"></div>
        <div id="tablesContainer"></div>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
